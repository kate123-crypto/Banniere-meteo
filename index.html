document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

04, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b00462cb-78eb-4961-9162-0b29daad6e90\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"7f66f7b9-f5b9-41a6-b745-3bf7d7e0344b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  html, body { height: 100%; }\n  body {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    background: #f5f3ef;\n    font-family: 'Outfit', sans-serif;\n    overflow: hidden;\n    padding: 16px;\n  }\n\n  /* ============= LE CADRE BANNIÈRE 800x200 ============= */\n  .banner {\n    width: 100%;\n    max-width: 800px;\n    aspect-ratio: 4 / 1;\n    border-radius: 24px;\n    overflow: hidden;\n    position: relative;\n    box-shadow: 0 18px 60px -20px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.9) inset;\n    isolation: isolate;\n  }\n\n  /* ============= CIEL — gradient évolutif ============= */\n  .sky {\n    position: absolute; inset: 0;\n    transition: background 4s ease;\n    z-index: 0;\n  }\n\n  /* ============= ÉTOILES (nuit) ============= */\n  .stars {\n    position: absolute; inset: 0;\n    opacity: 0;\n    transition: opacity 2s ease;\n    pointer-events: none;\n    z-index: 1;\n  }\n  .stars .star {\n    position: absolute;\n    width: 2px; height: 2px;\n    background: white;\n    border-radius: 50%;\n    box-shadow: 0 0 4px rgba(255,255,255,0.8);\n    animation: twinkle 3s ease-in-out infinite;\n  }\n  @keyframes twinkle {\n    0%, 100% { opacity: 0.3; }\n    50% { opacity: 1; }\n  }\n\n  /* ============= SOLEIL / LUNE ============= */\n  .celestial {\n    position: absolute;\n    width: 80px; height: 80px;\n    border-radius: 50%;\n    transition: background 3s ease, box-shadow 3s ease, transform 0s linear;\n    z-index: 2;\n    pointer-events: none;\n  }\n  .celestial.sun {\n    background: radial-gradient(circle at 35% 35%, #fff5d6, #fcd989 60%, #f5b659);\n    box-shadow:\n      0 0 60px 10px rgba(252,217,137,0.5),\n      0 0 120px 30px rgba(252,217,137,0.25);\n  }\n  .celestial.moon {\n    background: radial-gradient(circle at 35% 35%, #fafafa, #d8d6dc 60%, #b9b6c4);\n    box-shadow:\n      0 0 50px 8px rgba(216,214,220,0.4),\n      0 0 100px 20px rgba(216,214,220,0.2);\n  }\n\n  /* ============= NUAGES ============= */\n  .clouds {\n    position: absolute; inset: 0;\n    z-index: 3;\n    pointer-events: none;\n    overflow: hidden;\n  }\n  .cloud {\n    position: absolute;\n    background: white;\n    border-radius: 50%;\n    filter: blur(8px);\n    opacity: 0.7;\n    animation: drift linear infinite;\n  }\n  @keyframes drift {\n    from { transform: translateX(-200px); }\n    to { transform: translateX(900px); }\n  }\n\n  /* ============= COLLINES ============= */\n  .hills {\n    position: absolute;\n    bottom: 0; left: 0; right: 0;\n    z-index: 4;\n    pointer-events: none;\n  }\n  .hills svg {\n    display: block;\n    width: 100%;\n    height: auto;\n  }\n\n  /* ============= PLUIE ============= */\n  .weather-fx {\n    position: absolute; inset: 0;\n    z-index: 6;\n    pointer-events: none;\n    overflow: hidden;\n  }\n  .raindrop {\n    position: absolute;\n    width: 2px;\n    background: linear-gradient(to bottom, transparent, rgba(235,245,255,0.95));\n    border-radius: 1px;\n    box-shadow: 0 0 2px rgba(255,255,255,0.5);\n    animation: rain-fall linear infinite;\n  }\n  @keyframes rain-fall {\n    from { transform: translateY(-30px); opacity: 0; }\n    10%  { opacity: 1; }\n    to   { transform: translateY(220px); opacity: 0.4; }\n  }\n  .snowflake {\n    position: absolute;\n    width: 5px; height: 5px;\n    background: white;\n    border-radius: 50%;\n    box-shadow: 0 0 4px rgba(255,255,255,0.9);\n    animation: snow-fall linear infinite;\n    opacity: 0.85;\n  }\n  @keyframes snow-fall {\n    from { transform: translate(0,-20px) rotate(0deg); opacity: 0; }\n    10%  { opacity: 1; }\n    to   { transform: translate(40px,220px) rotate(360deg); opacity: 0.6; }\n  }\n  .lightning-flash {\n    position: absolute; inset: 0;\n    background: rgba(255,255,255,0);\n    pointer-events: none;\n    z-index: 7;\n  }\n  .lightning-flash.flash {\n    animation: lightning 0.4s ease-out;\n  }\n  @keyframes lightning {\n    0%   { background: rgba(255,255,255,0); }\n    8%   { background: rgba(255,255,240,0.95); }\n    16%  { background: rgba(255,255,255,0.2); }\n    25%  { background: rgba(255,255,240,0.85); }\n    100% { background: rgba(255,255,255,0); }\n  }\n\n  /* ============= PARTICULES SAISONNIÈRES ============= */\n  .seasons {\n    position: absolute; inset: 0;\n    z-index: 6;\n    pointer-events: none;\n    overflow: hidden;\n  }\n  .particle {\n    position: absolute;\n    will-change: transform;\n  }\n  .petal {\n    width: 10px; height: 12px;\n    background: radial-gradient(ellipse at 50% 30%, #ffd1e0, #ff9bb8 70%, #f57aa1);\n    border-radius: 60% 60% 50% 50% / 70% 70% 40% 40%;\n    opacity: 0.85;\n    animation: float-petal linear infinite;\n  }\n  @keyframes float-petal {\n    0%   { transform: translate(0,-20px) rotate(0deg); opacity: 0; }\n    10%  { opacity: 0.9; }\n    100% { transform: translate(120px,220px) rotate(720deg); opacity: 0.5; }\n  }\n  .leaf {\n    width: 18px; height: 18px;\n    background: linear-gradient(135deg, #e8923a 0%, #c5651e 50%, #8a3d12 100%);\n    /* feuille d'érable stylisée */\n    clip-path: polygon(\n      50% 0%,\n      58% 18%,\n      75% 12%,\n      72% 30%,\n      90% 35%,\n      78% 48%,\n      95% 60%,\n      72% 60%,\n      80% 80%,\n      58% 70%,\n      55% 95%,\n      50% 80%,\n      45% 95%,\n      42% 70%,\n      20% 80%,\n      28% 60%,\n      5% 60%,\n      22% 48%,\n      10% 35%,\n      28% 30%,\n      25% 12%,\n      42% 18%\n    );\n    opacity: 0.92;\n    animation: float-leaf linear infinite;\n    transform-origin: center;\n  }\n  @keyframes float-leaf {\n    0%   { transform: translate(0,-30px) rotate(-20deg) rotateY(0deg); opacity: 0; }\n    8%   { opacity: 0.95; }\n    20%  { transform: translate(40px,40px) rotate(60deg) rotateY(120deg); }\n    40%  { transform: translate(10px,80px) rotate(140deg) rotateY(240deg); }\n    60%  { transform: translate(60px,130px) rotate(220deg) rotateY(360deg); }\n    80%  { transform: translate(20px,180px) rotate(300deg) rotateY(480deg); }\n    100% { transform: translate(80px,230px) rotate(380deg) rotateY(600deg); opacity: 0.3; }\n  }\n  .pollen {\n    width: 4px; height: 4px;\n    background: radial-gradient(circle, rgba(255,240,180,1), rgba(255,220,120,0.4));\n    border-radius: 50%;\n    opacity: 0.7;\n    box-shadow: 0 0 6px rgba(255,235,150,0.8);\n    animation: float-pollen linear infinite;\n  }\n  @keyframes float-pollen {\n    0%   { transform: translate(0,0); opacity: 0; }\n    10%  { opacity: 0.8; }\n    50%  { transform: translate(60px,-30px); }\n    100% { transform: translate(150px,40px); opacity: 0; }\n  }\n\n  /* ============= REFLET BAS (eau / brume) ============= */\n  .reflection {\n    position: absolute;\n    bottom: 0; left: 0; right: 0;\n    height: 30%;\n    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15));\n    z-index: 5;\n    pointer-events: none;\n  }\n\n  /* ============= OVERLAY TEXTE ============= */\n  .overlay {\n    position: absolute;\n    inset: 0;\n    z-index: 10;\n    display: flex;\n 65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"><\u002Fpath>\n  <\u002Fsvg>\n<\u002Fbutton>\n\n<div class=\"panel\" id=\"panel\">\n  <h3>Réglages<\u002Fh3>\n\n  <label>\n    <span>Localisation<\u002Fspan>\n    <select id=\"locMode\">\n      <option value=\"auto\">Auto (géolocalisation)<\u002Foption>\n      <option value=\"manual\">Ville manuelle<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n\n  <label id=\"cityRow\" style=\"display:none\">\n    <span>Ville<\u002Fspan>\n    <input type=\"text\" id=\"city\" placeholder=\"Paris, France\">\n  <\u002Flabel>\n\n  <label>\n    <span>Ambiance<\u002Fspan>\n    <select id=\"palette\">\n      <option value=\"pastel\">Doux &amp; pastel<\u002Foption>\n      <option value=\"warm\">Chaud &amp; doré<\u002Foption>\n      <option value=\"cool\">Frais &amp; bleuté<\u002Foption>\n      <option value=\"dusk\">Crépusculaire<\u002Foption>\n      <option value=\"mono\">Monochrome<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n\n  <div class=\"toggle-row\">\n    <span>Nuages animés<\u002Fspan>\n    <div class=\"switch on\" id=\"cloudsToggle\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"toggle-row\">\n    <span>Étoiles (nuit)<\u002Fspan>\n    <div class=\"switch on\" id=\"starsToggle\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <label>\n    <span>Heure forcée (test) — laisse vide pour heure réelle<\u002Fspan>\n    <input type=\"number\" id=\"forceHour\" min=\"0\" max=\"23\" placeholder=\"0–23\">\n  <\u002Flabel>\n\n  <label>\n    <span>Météo forcée (test)<\u002Fspan>\n    <select id=\"forceWeather\">\n      <option value=\"\">— Vraie météo —<\u002Foption>\n      <option value=\"0\">Ensoleillé<\u002Foption>\n      <option value=\"2\">Partiellement nuageux<\u002Foption>\n      <option value=\"45\">Brumeux<\u002Foption>\n      <option value=\"61\">Pluie<\u002Foption>\n      <option value=\"71\">Neige<\u002Foption>\n      <option value=\"82\">Averses<\u002Foption>\n      <option value=\"95\">Orage ⚡<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n\n  <label>\n    <span>Saison forcée (test)<\u002Fspan>\n    <select id=\"forceSeason\">\n      <option value=\"\">— Saison réelle —<\u002Foption>\n      <option value=\"spring\">🌸 Printemps (pétales)<\u002Foption>\n      <option value=\"summer\">✨ Été (pollen)<\u002Foption>\n      <option value=\"autumn\">🍂 Automne (feuilles)<\u002Foption>\n      <option value=\"winter\">❄️ Hiver (rien)<\u002Foption>\n    <\u002Fselect>\n  <\u002Flabel>\n\n  <div class=\"info\" id=\"locInfo\">📍 Paris, France<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ============= STATE =============\nconst STATE = /*EDITMODE-BEGIN*/{\n  \"locMode\": \"auto\",\n  \"city\": \"marseille\",\n  \"palette\": \"pastel\",\n  \"cloudsAnim\": true,\n  \"starsOn\": true\n}/*EDITMODE-END*/;\n\nlet state = Object.assign({}, STATE);\nlet weatherData = null;\nlet currentLoc = null;\n\n// ============= PALETTES =============\n// Chaque palette définit le ciel à différentes phases du jour (0..1)\nconst PALETTES = {\n  pastel: {\n    night:    ['#1a1a2e', '#2c2845', '#3d3358'],\n    dawn:     ['#f7c5b3', '#fce0c8', '#fef0e0'],\n    morning:  ['#cfe4f5', '#f8e3d1', '#fef5ea'],\n    noon:     ['#a8d0e8', '#d8e8f3', '#fef9f3'],\n    afternoon:['#c2dbed', '#f5dcc4', '#fdebd6'],\n    sunset:   ['#f5a591', '#fcc89c', '#fde2cb'],\n    dusk:     ['#7e6699', '#c490a5', '#f0b8a8'],\n    ink: '#2a2438',\n    hill: '#d97a6e'\n  },\n  warm: {\n    night:    ['#2c1a14', '#3e2820', '#52372a'],\n    dawn:     ['#f7b48f', '#fcd6a5', '#fee8c8'],\n    morning:  ['#fbd7a8', '#fde6c1', '#fff3dc'],\n    noon:     ['#fce0a3', '#fdebbe', '#fff5d8'],\n    afternoon:['#fbcd8b', '#fcdaa1', '#fde6bd'],\n    sunset:   ['#e8806b', '#f5a989', '#fbcfae'],\n    dusk:     ['#7a3f3a', '#b46659', '#e09576'],\n    ink: '#3a1f15',\n    hill: '#c45a3a'\n  },\n  cool: {\n    night:    ['#0f1a2e', '#1a2845', '#243a5a'],\n    dawn:     ['#a8b8d8', '#cad4e8', '#e2e8f3'],\n    morning:  ['#a3c4e3', '#c5dceb', '#e0eaf3'],\n    noon:     ['#7fb8e0', '#a8d0e8', '#d0e2f0'],\n    afternoon:['#94b8d8', '#b6cce3', '#d6e0eb'],\n    sunset:   ['#a89cc7', '#c8b8d9', '#dcd0e3'],\n    dusk:     ['#3d4a72', '#6b6f99', '#9b9bb5'],\n    ink: '#1a2845',\n    hill: '#c98a85'\n  },\n  dusk: {\n    night:    ['#0a0820', '#231740', '#3d2658'],\n    dawn:     ['#3d2658', '#7a4a6e', '#c08a85'],\n    morning:  ['#9a7a9a', '#c5a8b0', '#e8d4cb'],\n    noon:     ['#bca0bf', '#d6c0ce', '#ebd9d9'],\n    afternoon:['#a888a3', '#cba6ac', '#e2c0b9'],\n    sunset:   ['#7a3a5e', '#b85e6f', '#e8907a'],\n    dusk:     ['#1f1438', '#522850', '#9c4a6a'],\n    ink: '#1f1438',\n    hill: '#a8456a'\n  },\n  mono: {\n    night:    ['#0a0a0a', '#1c1c1c', '#2e2e2e'],\n    dawn:     ['#bababa', '#d4d4d4', '#ededed'],\n    morning:  ['#c8c8c8', '#dcdcdc', '#efefef'],\n    noon:     ['#a8a8a8', '#cccccc', '#e8e8e8'],\n    afternoon:['#bcbcbc', '#d2d2d2', '#e6e6e6'],\n    sunset:   ['#888888', '#a8a8a8', '#cccccc'],\n    dusk:     ['#3a3a3a', '#5e5e5e', '#888888'],\n    ink: '#1a1a1a',\n    hill: '#5a5a5a'\n  }\n};\n\n// ============= TIME / PHASE LOGIC =============\n// Retourne { phase: \"dawn\"|\"morning\"|... , progress: 0..1 dans la phase, sunPos: 0..1 (0=lever, 1=coucher) }\nfunction getDayInfo(now, sunrise, sunset) {\n  const ms = now.getTime();\n  const sr = sunrise.getTime();\n  const ss = sunset.getTime();\n  const dayDur = ss - sr;\n\n  // Phases (par rapport au lever/coucher)\n  const dawnStart  = sr - 60*60*1000;        // 1h avant lever\n  const dawnEnd    = sr + 30*60*1000;        // 30min après\n  const morningEnd = sr + dayDur * 0.35;\n  const noonEnd    = sr + dayDur * 0.65;\n  const afterEnd   = ss - 30*60*1000;\n  const sunsetEnd  = ss + 30*60*1000;\n  const duskEnd    = ss + 90*60*1000;\n\n  let phase, label;\n  if (ms < dawnStart || ms > duskEnd)        { phase = 'night';     label = 'Nuit'; }\n  else if (ms < dawnEnd)                      { phase = 'dawn';      label = 'Aube'; }\n  else if (ms < morningEnd)                   { phase = 'morning';   label = 'Matin'; }\n  else if (ms < noonEnd)                      { phase = 'noon';      label = 'Midi'; }\n  else if (ms < afterEnd)                     { phase = 'afternoon'; label = 'Après-midi'; }\n  else if (ms < sunsetEnd)                    { phase = 'sunset';    label = 'Coucher'; }\n  else                                         { phase = 'dusk';      label = 'Crépuscule'; }\n\n  // Position du soleil/lune dans le ciel (0=horizon gauche, 1=horizon droit)\n  let sunPos;\n  if (ms >= sr && ms <= ss) {\n    sunPos = (ms - sr) / dayDur; // 0..1\n  } else if (ms < sr) {\n    // Avant lever : la lune est en train de descendre côté droit, ou au milieu\n    const prevSet = ss - 24*60*60*1000;\n    sunPos = (ms - prevSet) / (sr - prevSet);\n  } else {\n    // Après coucher : lune monte côté gauche\n    const nextRise = sr + 24*60*60*1000;\n    sunPos = (ms - ss) / (nextRise - ss);\n  }\n\n  const isDay = (ms >= sr && ms <= ss);\n\n  return { phase, label, sunPos: Math.max(0, Math.min(1, sunPos)), isDay };\n}\n\n// ============= APPLY VISUALS =============\nfunction blend(a, b, t) {\n  // mélange deux couleurs hex, t=0 → a, t=1 → b\n  const pa = a.replace('#',''), pb = b.replace('#','');\n  const ra = parseInt(pa.slice(0,2),16), ga = parseInt(pa.slice(2,4),16), ba = parseInt(pa.slice(4,6),16);\n  const rb = parseInt(pb.slice(0,2),16), gb = parseInt(pb.slice(2,4),16), bb = parseInt(pb.slice(4,6),16);\n  const r = Math.round(ra + (rb - ra) * t);\n  const g = Math.round(ga + (gb - ga) * t);\n  const bl = Math.round(ba + (bb - ba) * t);\n  return `rgb(${r},${g},${bl})`;\n}\n\nfunction applyVisuals() {\n  const now = state.forceHour != null\n    ? new Date(new Date().setHours(state.forceHour, 0, 0, 0))\n    : new Date();\n\n  let sunrise, sunset;\n  if (weatherData && weatherData.sunrise) {\n    sunrise = new Date(weatherData.sunrise);\n    sunset = new Date(weatherData.sunset);\n    // Si on force l'heure, garder lever/coucher du jour mais ajuster la date\n    if (state.forceHour != null) {\n      sunrise = new Date(now); sunrise.setHours(7, 30, 0, 0);\n      sunset = new Date(now); sunset.setHours(20, 30, 0, 0);\n    }\n  } else {\n    sunrise = new Date(now); sunrise.setHours(7, 30, 0, 0);\n    sunset = new Date(now); sunset.setHours(20, 30, 0, 0);\n  }\n\n  const info = getDayInfo(now, sunrise, sunset);\n  const palette = PALETTES[state.palette] || PALETTES.pastel;\n  const colors = palette[info.phase];\n\n  // Sky gradient — teinte météo prend le dessus si applicable\n  const activeCode = (state.forceWeatherCode != null)\n    ? state.forceWeatherCode\n    : (weatherData ? weatherData.code : null);\n  const tint = activeCode != null ? getWeatherTint(activeCode) : null;\n  let skyColors = tint\n    ? [blend(colors[0], tint[0], 0.7), blend(colors[1], tint[1], 0.7), blend(colors[2], tint[2], 0.6)]\n    : colors.slice();\n  // Teinte saison automne — ambiance orangée chaleureuse et lumineuse\n  if (getSeason() === 'autumn') {\n    const warm = ['#ffe4bc', '#ffcc94', '#f5b078'];\n    skyColors = [\n      blend(skyColors[0], warm[0], 0.5),\n      blend(skyColors[1], warm[1], 0.42),\n      blend(skyColors[2], warm[2], 0.32),\n    ];\n  }\n  const sky = document.getElementById('sky');\n  sky.style.background = `linear-gradient(to bottom, ${skyColors[0]} 0%, ${skyColors[1]} 55%, ${skyColors[2]} 100%)`;\n\n  // Texte — clair la nuit / crépuscule, sombre le jour\n  const isDarkPhase = (info.phase === 'night' || info.phase === 'dusk');\n  const ink = isDarkPhase ? '#fefaf2' : palette.ink;\n  document.body.style.setProperty('--ink', ink);\n  document.querySelector('.overlay').style.color = ink;\n  document.getElementById('phase').textContent = info.label;\n\n  // Soleil / lune\n  const cel = document.getElementById('celestial');\n  cel.classList.toggle('sun', info.isDay);\n  cel.classList.toggle('moon', !info.isDay);\n\n  // Position : arc parabolique\n  const banner = document.querySelector('.banner');\n  const w = banner.offsetWidth;\n  const h = banner.offsetHeight;\n  const size = 80;\n  const x = info.sunPos * (w - size * 0.4) - size * 0.3;\n  // Arc : y est haut au milieu, bas aux extrémités\n  const t = info.sunPos;\n  const arcY = 4 * t * (1 - t); // 0 aux bords, 1 au milieu\n  const yMin = 10; // hauteur max (proche du haut)\n  const yMax = h * 0.55; // hauteur min (proche horizon)\n  const y = yMax - (yMax - yMin) * arcY;\n  cel.style.left = x + 'px';\n  cel.style.top = y + 'px';\n\n  // Étoiles : visibles la nuit\n  const starsEl = document.getElementById('stars');\n  const showStars = state.starsOn && (info.phase === 'night' || info.phase === 'dusk');\n  starsEl.style.opacity = showStars ? '1' : '0';\n\n  // Hills couleur — teinte chaude qui suit la palette\n  const hillBack = document.getElementById('hill-back');\n  const hillFront = document.getElementById('hill-front');\n  hillBack.setAttribute('fill', palette.hill);\n  hillFront.setAttribute('fill', palette.hill);\n}\n\n// ============= STARS GENERATION =============\nfunction generateStars() {\n  const container = document.getElementById('stars');\n  container.innerHTML = '';\n  for (let i = 0; i < 30; i++) {\n    const s = document.createElement('div');\n    s.className = 'star';\n    s.style.left = Math.random() * 100 + '%';\n    s.style.top = Math.random() * 60 + '%';\n    s.style.animationDelay = Math.random() * 3 + 's';\n    s.style.animationDuration = (2 + Math.random() * 3) + 's';\n    container.appendChild(s);\n  }\n}\n\n// ============= CLOUDS =============\nfunction generateClouds(intensity) {\n  // intensity: 0 = ciel clair, 1 = très nuageux\n  const container = document.getElementById('clouds');\n  container.innerHTML = '';\n  if (!state.cloudsAnim) return;\n\n  // Beaucoup plus de nuages quand le ciel est couvert\n  const count = Math.round(intensity * 18) + 1;\n  const baseOpacity = 0.45 + intensity * 0.35;\n  // Nuages blancs / clairs (légèrement plus crémeux quand couvert)\n  const cloudColor = intensity > 0.7 ? 'rgb(248,248,250)' : 'white';\n\n  for (let i = 0; i < count; i++) {\n    const c = document.createElement('div');\n    c.className = 'cloud';\n    const w = 80 + Math.random() * 140;\n    c.style.width = w + 'px';\n    c.style.height = (w * 0.4) + 'px';\n    c.style.top = (5 + Math.random() * 60) + '%';\n    c.style.opacity = (baseOpacity + Math.random() * 0.25).toFixed(2);\n    c.style.background = cloudColor;\n    c.style.filter = `blur(${8 + intensity * 6}px)`;\n    c.style.animationDuration = (40 + Math.random() * 50) + 's';\n    c.style.animationDelay = (-Math.random() * 80) + 's';\n    container.appendChild(c);\n  }\n}\n\n// ============= WEATHER SKY TINT =============\n// Renvoie un gradient teinté selon la météo (par-dessus la palette de phase)\nfunction getWeatherTint(code) {\n  // Light rain\n  if (code >= 51 && code <= 59) return ['#b8c0cc', '#cdd2da', '#dee2e6'];\n  // Pluie / averses — gris doux mais lumineux, pas sombre\n  if ((code >= 61 && code <= 67) || (code >= 80 && code <= 82))\n    return ['#9aa4b2', '#bcc2cc', '#d8dce2'];\n  // Brouillard\n  if (code >= 45 && code <= 48) return ['#c8ccd2', '#dadde0', '#e8eaec'];\n  // Neige\n  if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86))\n    return ['#bcc8d5', '#d6dee6', '#ecf0f3'];\n  // Orage — seul vraiment sombre\n  if (code >= 95 && code <= 99) return ['#1f2638', '#3a4258', '#5a6478'];\n  return null;\n}\n\n// ============= WEATHER FETCH (Open-Meteo) =============\nasync function fetchWeather(lat, lon, label) {\n  try {\n    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,cloud_cover&daily=sunrise,sunset&timezone=auto`;\n    const r = await fetch(url);\n    const d = await r.json();\n    weatherData = {\n      temp: Math.round(d.current.temperature_2m),\n      code: d.current.weather_code,\n      cloudCover: d.current.cloud_cover,\n      sunrise: d.daily.sunrise[0],\n      sunset: d.daily.sunset[0],\n      label: label || `${lat.toFixed(2)}, ${lon.toFixed(2)}`\n    };\n    document.getElementById('temp').textContent = weatherData.temp + '°';\n    document.getElementById('conditions').textContent = describeWeather(d.current.weather_code);\n    document.getElementById('sunrise').textContent = formatTime(new Date(d.daily.sunrise[0]));\n    document.getElementById('sunset').textContent = formatTime(new Date(d.daily.sunset[0]));\n    document.getElementById('locInfo').textContent = `📍 ${weatherData.label}`;\n    generateClouds(weatherData.cloudCover / 100);\n    applyWeatherFx(d.current.weather_code);\n    applySeasonalParticles();\n    applyVisuals();\n  } catch (e) {\n    console.error('Weather fetch failed', e);\n    document.getElementById('locInfo').textContent = '⚠️ Météo indisponible';\n  }\n}\n\nfunction describeWeather(code) {\n  // Open-Meteo weather codes\n  if (code === 0) return 'Ensoleillé';\n  if (code <= 3) return 'Partiellement nuageux';\n  if (code <= 48) return 'Brumeux';\n  if (code <= 67) return 'Pluie';\n  if (code <= 77) return 'Neige';\n  if (code <= 82) return 'Averses';\n  if (code <= 99) return 'Orage';\n  return '—';\n}\n\n// ============= WEATHER FX (rain / snow / lightning) =============\nlet lightningTimer = null;\nfunction applyWeatherFx(code) {\n  const fx = document.getElementById('weatherFx');\n  fx.innerHTML = '';\n  if (lightningTimer) { clearInterval(lightningTimer); lightningTimer = null; }\n\n  const isRain  = (code >= 51 && code <= 67) || (code >= 80 && code <= 82);\n  const isSnow  = (code >= 71 && code <= 77) || (code >= 85 && code <= 86);\n  const isStorm = (code >= 95 && code <= 99);\n\n  if (isRain || isStorm) {\n    const count = isStorm ? 80 : 50;\n    for (let i = 0; i < count; i++) {\n      const drop = document.createElement('div');\n      drop.className = 'raindrop';\n      drop.style.left = Math.random() * 100 + '%';\n      const len = 8 + Math.random() * 14;\n      drop.style.height = len + 'px';\n      drop.style.animationDuration = (0.4 + Math.random() * 0.5) + 's';\n      drop.style.animationDelay = (-Math.random() * 1.5) + 's';\n      drop.style.opacity = (0.7 + Math.random() * 0.3).toFixed(2);\n      fx.appendChild(drop);\n    }\n  }\n  if (isSnow) {\n    for (let i = 0; i < 40; i++) {\n      const flake = document.createElement('div');\n      flake.className = 'snowflake';\n      flake.style.left = Math.random() * 100 + '%';\n      const sz = 3 + Math.random() * 4;\n      flake.style.width = sz + 'px';\n      flake.style.height = sz + 'px';\n      flake.style.animationDuration = (5 + Math.random() * 5) + 's';\n      flake.style.animationDelay = (-Math.random() * 8) + 's';\n      flake.style.opacity = (0.5 + Math.random() * 0.4).toFixed(2);\n      fx.appendChild(flake);\n    }\n  }\n  if (isStorm) {\n    const flash = document.getElementById('lightning');\n    const trigger = () => {\n      flash.classList.remove('flash');\n      void flash.offsetWidth;\n      flash.classList.add('flash');\n    };\n    lightningTimer = setInterval(() => {\n      if (Math.random() < 0.4) trigger();\n    }, 3500);\n  }\n}\n\n// ============= SEASONS (pétales / pollen / feuilles / flocons décoratifs) =============\nfunction getSeason() {\n  if (state.forceSeason) return state.forceSeason;\n  // Hémisphère nord\n  const m = new Date().getMonth(); // 0..11\n  if (m >= 2 && m <= 4)  return 'spring'; // mars-mai\n  if (m >= 5 && m <= 7)  return 'summer'; // juin-août\n  if (m >= 8 && m <= 10) return 'autumn'; // sept-nov\n  return 'winter';                         // déc-fév\n}\n\nfunction applySeasonalParticles() {\n  const c = document.getElementById('seasons');\n  c.innerHTML = '';\n  // Particules saisonnières uniquement par beau temps\n  const activeCode = (state.forceWeatherCode != null)\n    ? state.forceWeatherCode\n    : (weatherData ? weatherData.code : 0);\n  const isFair = (activeCode <= 2); // Ensoleillé / partiellement nuageux seulement\n  if (!isFair) return;\n  const season = getSeason();\n  let cls, count;\n  if (season === 'spring')      { cls = 'petal';  count = 12; }\n  else if (season === 'summer') { cls = 'pollen'; count = 18; }\n  else if (season === 'autumn') { cls = 'leaf';   count = 10; }\n  else                          { cls = null;     count = 0; }\n  if (!cls) return;\n  for (let i = 0; i < count; i++) {\n    const p = document.createElement('div');\n    p.className = 'particle ' + cls;\n    p.style.left = (Math.random() * 100 - 5) + '%';\n    p.style.top = (Math.random() * 30) + '%';\n    p.style.animationDuration = (cls === 'leaf' ? 11 + Math.random() * 9 : 8 + Math.random() * 10) + 's';\n    p.style.animationDelay = (-Math.random() * 18) + 's';\n    // Variations de teinte / taille pour les feuilles\n    if (cls === 'leaf') {\n      const tints = ['hue-rotate(0deg)', 'hue-rotate(-15deg) saturate(0.9)', 'hue-rotate(20deg)', 'hue-rotate(-30deg) brightness(0.85)'];\n      p.style.filter = tints[Math.floor(Math.random() * tints.length)];\n    }\n    p.style.transform = `scale(${0.7 + Math.random() * 0.6})`;\n    c.appendChild(p);\n  }\n}\n\nfunction formatTime(d) {\n  return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });\n}\n\n// ============= GEOCODING (ville → lat/lon) =============\nasync function geocodeCity(name) {\n  try {\n    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=fr&format=json`;\n    const r = await fetch(url);\n    const d = await r.json();\n    if (d.results && d.results[0]) {\n      const c = d.results[0];\n      return { lat: c.latitude, lon: c.longitude, label: `${c.name}${c.country ? ', ' + c.country : ''}` };\n    }\n    return null;\n  } catch (e) { return null; }\n}\n\n// ============= LOCATION RESOLUTION =============\nasync function resolveLocation() {\n  if (state.locMode === 'manual' && state.city) {\n    const loc = await geocodeCity(state.city);\n    if (loc) {\n      currentLoc = loc;\n      fetchWeather(loc.lat, loc.lon, loc.label);\n    } else {\n      document.getElementById('locInfo').textContent = '⚠️ Ville introuvable';\n    }\n  } else {\n    // Auto via géoloc\n    if (!navigator.geolocation) {\n      // Fallback : Paris\n      currentLoc = { lat: 48.8566, lon: 2.3522, label: 'Paris, France' };\n      fetchWeather(48.8566, 2.3522, 'Paris, France');\n      return;\n    }\n    navigator.geolocation.getCurrentPosition(\n      pos => {\n        currentLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };\n        // Reverse geocode pour avoir le nom\n        reverseGeocode(pos.coords.latitude, pos.coords.longitude);\n      },\n      err => {\n        // Permission refusée → fallback Paris\n        document.getElementById('locInfo').textContent = '📍 Paris (géoloc refusée)';\n        currentLoc = { lat: 48.8566, lon: 2.3522, label: 'Paris, France' };\n        fetchWeather(48.8566, 2.3522, 'Paris, France');\n      },\n      { timeout: 8000 }\n    );\n  }\n}\n\nasync function reverseGeocode(lat, lon) {\n  try {\n    // Open-Meteo n'a pas de reverse, on fait une petite triche : cherche par coords\n    // Utilise BigDataCloud (free, no key)\n    const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=fr`);\n    const d = await r.json();\n    const label = `${d.city || d.locality || 'Position'}${d.countryName ? ', ' + d.countryName : ''}`;\n    fetchWeather(lat, lon, label);\n  } catch (e) {\n    fetchWeather(lat, lon, 'Position');\n  }\n}\n\n// ============= SAVE / LOAD =============\nfunction save() {\n  try { localStorage.setItem('aura-banner-state', JSON.stringify(state)); } catch (e) {}\n  // Persist via tweaks protocol\n  try {\n    window.parent.postMessage({\n      type: '__edit_mode_set_keys',\n      edits: {\n        locMode: state.locMode,\n        city: state.city,\n        palette: state.palette,\n        cloudsAnim: state.cloudsAnim,\n        starsOn: state.starsOn\n      }\n    }, '*');\n  } catch (e) {}\n}\n\nfunction load() {\n  try {\n    const raw = localStorage.getItem('aura-banner-state');\n    if (raw) Object.assign(state, JSON.parse(raw));\n  } catch (e) {}\n}\n\n// ============= UI WIRING =============\nfunction syncUI() {\n  document.getElementById('locMode').value = state.locMode;\n  document.getElementById('city').value = state.city || '';\n  document.getElementById('palette').value = state.palette;\n  document.getElementById('cityRow').style.display = state.locMode === 'manual' ? 'flex' : 'none';\n  document.getElementById('cloudsToggle').classList.toggle('on', state.cloudsAnim);\n  document.getElementById('starsToggle').classList.toggle('on', state.starsOn);\n}\n\ndocument.getElementById('tweaksBtn').addEventListener('click', () => {\n  document.getElementById('panel').classList.toggle('open');\n});\n\ndocument.getElementById('locMode').addEventListener('change', e => {\n  state.locMode = e.target.value;\n  syncUI();\n  save();\n  resolveLocation();\n});\ndocument.getElementById('city').addEventListener('change', e => {\n  state.city = e.target.value;\n  save();\n  if (state.locMode === 'manual') resolveLocation();\n});\ndocument.getElementById('palette').addEventListener('change', e => {\n  state.palette = e.target.value;\n  save();\n  applyVisuals();\n});\ndocument.getElementById('cloudsToggle').addEventListener('click', e => {\n  state.cloudsAnim = !state.cloudsAnim;\n  syncUI();\n  save();\n  generateClouds(weatherData ? weatherData.cloudCover / 100 : 0.3);\n});\ndocument.getElementById('starsToggle').addEventListener('click', e => {\n  state.starsOn = !state.starsOn;\n  syncUI();\n  save();\n  applyVisuals();\n});\ndocument.getElementById('forceHour').addEventListener('input', e => {\n  const v = e.target.value;\n  state.forceHour = v === '' ? null : parseInt(v, 10);\n  applyVisuals();\n});\ndocument.getElementById('forceWeather').addEventListener('change', e => {\n  const v = e.target.value;\n  if (v === '') {\n    state.forceWeatherCode = null;\n    if (weatherData) {\n      applyWeatherFx(weatherData.code);\n      document.getElementById('conditions').textContent = describeWeather(weatherData.code);\n      generateClouds(weatherData.cloudCover / 100);\n    }\n  } else {\n    const code = parseInt(v, 10);\n    state.forceWeatherCode = code;\n    applyWeatherFx(code);\n    document.getElementById('conditions').textContent = describeWeather(code);\n    // intensité de nuages selon le code\n    let cc = 0.1;\n    if (code === 2) cc = 0.45;\n    else if (code === 45) cc = 0.95;\n    else if (code === 61) cc = 0.85;\n    else if (code === 71) cc = 0.7;\n    else if (code === 82) cc = 0.9;\n    else if (code === 95) cc = 1;\n    generateClouds(cc);\n  }\n  applySeasonalParticles();\n  applyVisuals();\n});\n\ndocument.getElementById('forceSeason').addEventListener('change', e => {\n  state.forceSeason = e.target.value || null;\n  applySeasonalParticles();\n  applyVisuals();\n});\n\n// ============= TWEAKS PROTOCOL =============\nwindow.addEventListener('message', e => {\n  if (!e.data) return;\n  if (e.data.type === '__activate_edit_mode') {\n    document.getElementById('tweaksBtn').style.display = 'flex';\n  } else if (e.data.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaksBtn').style.display = 'none';\n    document.getElementById('panel').classList.remove('open');\n  }\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n// ============= INIT =============\nload();\nsyncUI();\ngenerateStars();\ngenerateClouds(0.3); // initial avant fetch\napplySeasonalParticles();\napplyVisuals();\nresolveLocation();\n\n// Re-render every 60s pour refléter le passage du temps\nsetInterval(applyVisuals, 60000);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
